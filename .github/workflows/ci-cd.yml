name: 🚀 CI/CD Pipeline - Complete Suite

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  AWS_REGION: ${{ secrets.AWS_REGION || 'us-east-1' }}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ==================== CODE QUALITY ====================
  code-quality:
    name: "📝 Code Quality Checks"
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Cache pip dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        cd backend
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Black formatter check
      run: |
        cd backend
        black --check --diff . || exit 1
      continue-on-error: false

    - name: Run isort import check
      run: |
        cd backend
        isort --check-only --diff . || exit 1
      continue-on-error: false

    - name: Run Flake8 linting
      run: |
        cd backend
        flake8 . --max-line-length=88 --extend-ignore=E203,W503 || exit 1
      continue-on-error: false

  # ==================== UNIT TESTS ====================
  unit-tests:
    name: "🧪 Unit Tests"
    runs-on: ubuntu-latest
    needs: code-quality
    
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Cache pip dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        cd backend
        python -m pip install --upgrade pip
        pip install -r requirements.txt pytest-django

    - name: Run Django tests
      run: |
        cd backend
        python manage.py test --settings=config.settings.test -v 2
      env:
        POSTGRES_DB: test_db
        POSTGRES_USER: test_user
        POSTGRES_PASSWORD: test_password
        POSTGRES_HOST: localhost
        POSTGRES_PORT: 5432
        REDIS_URL: redis://localhost:6379
        SECRET_KEY: test-secret-key-for-ci

    - name: Generate coverage report
      run: |
        cd backend
        pip install coverage
        coverage run --source='apps' manage.py test --settings=config.settings.test
        coverage report
        coverage xml
        coverage html

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./backend/coverage.xml
        flags: unittests
        name: codecov-coverage
        fail_ci_if_error: false

    - name: Archive coverage reports
      if: always()
      uses: actions/upload-artifact@v3
      with:
        name: coverage-report
        path: backend/htmlcov/

  # ==================== DOCKER BUILD & PUSH ====================
  build-and-push:
    name: "🐳 Build & Push Docker Image"
    needs: unit-tests
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    outputs:
      image: ${{ steps.image.outputs.image }}
      
    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract Docker metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: |
          type=ref,event=branch
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=sha,prefix={{branch}}-
          type=raw,value=latest,enable={{is_default_branch}}

    - name: Build and push Docker image
      id: docker_build
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Output image
      id: image
      run: echo "image=${{ steps.meta.outputs.tags }}" >> $GITHUB_OUTPUT

  # ==================== SECURITY SCAN ====================
  security-scan:
    name: "🔒 Security Scan"
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v4

    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: ${{ needs.build-and-push.outputs.image }}
        format: 'sarif'
        output: 'trivy-results.sarif'

    - name: Upload Trivy results to GitHub Security
      uses: github/codeql-action/upload-sarif@v2
      if: always()
      with:
        sarif_file: 'trivy-results.sarif'

  # ==================== LOAD TESTS ====================
  load-tests:
    name: "⚡ Load Testing"
    runs-on: ubuntu-latest
    needs: unit-tests
    if: github.event_name == 'push' && github.ref == 'refs/heads/develop'
    
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        cd backend
        pip install -r requirements.txt

    - name: Initialize database
      run: |
        cd backend
        python manage.py migrate --settings=config.settings.test
        python manage.py shell < populate_db.py
      env:
        POSTGRES_DB: test_db
        POSTGRES_USER: test_user
        POSTGRES_PASSWORD: test_password
        POSTGRES_HOST: localhost
        POSTGRES_PORT: 5432
        REDIS_URL: redis://localhost:6379
        SECRET_KEY: test-secret-key-for-ci

    - name: Start Django development server
      run: |
        cd backend
        python manage.py runserver 0.0.0.0:8000 &
      env:
        POSTGRES_DB: test_db
        POSTGRES_USER: test_user
        POSTGRES_PASSWORD: test_password
        POSTGRES_HOST: localhost
        POSTGRES_PORT: 5432
        REDIS_URL: redis://localhost:6379
        SECRET_KEY: test-secret-key-for-ci

    - name: Wait for server to start
      run: |
        timeout 30 bash -c 'until curl -f http://localhost:8000/ 2>/dev/null; do sleep 1; done'

    - name: Install Locust
      run: pip install locust

    - name: Run Locust load tests
      run: |
        cd tests
        locust -f locustfile.py \
          --host=http://localhost:8000 \
          --users=50 \
          --spawn-rate=5 \
          --run-time=60s \
          --headless \
          --csv=locust-results
      continue-on-error: true

    - name: Upload load test results
      if: always()
      uses: actions/upload-artifact@v3
      with:
        name: load-test-results
        path: tests/locust-results_*

  # ==================== DEPLOY TO AWS ====================
  deploy-to-aws:
    name: "🚀 Deploy to AWS"
    runs-on: ubuntu-latest
    needs: [build-and-push, security-scan]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    
    steps:
    - uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Get current task definition
      id: task-def
      run: |
        aws ecs describe-task-definition \
          --task-definition ${{ secrets.ECS_TASK_DEFINITION }} \
          --region ${{ env.AWS_REGION }} \
          --query taskDefinition > task-definition.json

    - name: Update image in task definition
      id: update-task-def
      uses: aws-actions/amazon-ecs-render-task-definition@v1
      with:
        task-definition: task-definition.json
        container-name: taskapi
        image: ${{ needs.build-and-push.outputs.image }}

    - name: Register new task definition
      id: register-task
      run: |
        aws ecs register-task-definition \
          --cli-input-json file://${{ steps.update-task-def.outputs.task-definition }} \
          --region ${{ env.AWS_REGION }}

    - name: Update ECS service
      run: |
        aws ecs update-service \
          --cluster ${{ secrets.ECS_CLUSTER_NAME }} \
          --service ${{ secrets.ECS_SERVICE_NAME }} \
          --task-definition ${{ secrets.ECS_TASK_DEFINITION }} \
          --force-new-deployment \
          --region ${{ env.AWS_REGION }}

    - name: Wait for service deployment
      run: |
        aws ecs wait services-stable \
          --cluster ${{ secrets.ECS_CLUSTER_NAME }} \
          --services ${{ secrets.ECS_SERVICE_NAME }} \
          --region ${{ env.AWS_REGION }}
      timeout-minutes: 10

    - name: Run database migrations on ECS
      run: |
        TASK_ARN=$(aws ecs run-task \
          --cluster ${{ secrets.ECS_CLUSTER_NAME }} \
          --task-definition ${{ secrets.ECS_TASK_DEFINITION }} \
          --launch-type FARGATE \
          --network-configuration "awsvpcConfiguration={subnets=[${{ secrets.SUBNET_IDS }}],securityGroups=[${{ secrets.SECURITY_GROUP_ID }}],assignPublicIp=DISABLED}" \
          --overrides '{"containerOverrides":[{"name":"taskapi","command":["python","manage.py","migrate"]}]}' \
          --region ${{ env.AWS_REGION }} \
          --query 'tasks[0].taskArn' \
          --output text)
        
        aws ecs wait tasks-stopped \
          --cluster ${{ secrets.ECS_CLUSTER_NAME }} \
          --tasks $TASK_ARN \
          --region ${{ env.AWS_REGION }}

    - name: Deployment notification
      if: always()
      run: |
        if [ ${{ job.status }} == 'success' ]; then
          echo "✅ Deployment to AWS completed successfully!"
          echo "Service: ${{ secrets.ECS_SERVICE_NAME }}"
          echo "Cluster: ${{ secrets.ECS_CLUSTER_NAME }}"
        else
          echo "❌ Deployment failed!"
        fi

    - name: Notify on deployment
      if: failure()
      uses: actions/github-script@v7
      with:
        script: |
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: '⚠️ Deployment to AWS failed. Please check the workflow logs.'
          })
