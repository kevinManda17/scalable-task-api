services:
  web:
    build:
      context: ../
      dockerfile: docker/Dockerfile
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ../backend:/app
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    depends_on:
      - db
      - redis

  db:
    image: postgres:15
    env_file:
      - ../.env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7

  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - web

  locust:
    build:
      context: ../
      dockerfile: docker/Dockerfile.locust
    ports:
      - "8089:8089"
    volumes:
      - ../tests/locust:/mnt/locust
    command: ["-f", "/mnt/locust/locustfile.py", "--host", "http://web:8000"]
    depends_on:
      - web
    environment:
      - LOCUST_WEB_UI=true

volumes:
  postgres_data: