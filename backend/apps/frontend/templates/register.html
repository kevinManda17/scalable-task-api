{% extends 'base.html' %}
{% load static %}

{% block title %}Inscription - Task API{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <h1><i class="fas fa-user-plus"></i> Inscription</h1>
        
        <div id="register-message" class="alert" style="display: none;"></div>
        
        <form id="register-form">
            {% csrf_token %}
            
            <div class="form-group">
                <label for="username"><i class="fas fa-user"></i> Nom d'utilisateur</label>
                <input type="text" name="username" id="username" class="form-control" 
                       placeholder="Choisissez un nom d'utilisateur" required>
            </div>
            
            <div class="form-group">
                <label for="email"><i class="fas fa-envelope"></i> Email</label>
                <input type="email" name="email" id="email" class="form-control" 
                       placeholder="Entrez votre adresse email" required>
            </div>
            
            <div class="form-group">
                <label for="password"><i class="fas fa-lock"></i> Mot de passe</label>
                <input type="password" name="password" id="password" class="form-control" 
                       placeholder="Créez un mot de passe" required>
            </div>
            
            <button type="submit" class="btn btn-primary btn-block">
                <i class="fas fa-user-plus"></i> S'inscrire
            </button>
        </form>
        
        <div class="text-center mt-4">
            <p>Déjà un compte ? <a href="{% url 'frontend:login' %}">Connectez-vous</a></p>
        </div>
    </div>
</div>

<script>
document.getElementById('register-form').addEventListener('submit', function(e) {
    e.preventDefault();
    
    const formData = {
        username: document.getElementById('username').value,
        email: document.getElementById('email').value,
        password: document.getElementById('password').value
    };
    
    const messageDiv = document.getElementById('register-message');
    
    fetch('/api/accounts/register/', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
            'X-CSRFToken': getCookie('csrftoken')
        },
        body: JSON.stringify(formData)
    })
    .then(response => response.json())
    .then(data => {
        if (data.access) {
            localStorage.setItem('access_token', data.access);
            localStorage.setItem('refresh_token', data.refresh);
            
            messageDiv.style.display = 'block';
            messageDiv.className = 'alert alert-success';
            messageDiv.innerHTML = '<i class="fas fa-check-circle"></i> Inscription réussie ! Redirection...';
            
            setTimeout(() => {
                window.location.href = '{% url "frontend:dashboard" %}';
            }, 1000);
        } else {
            messageDiv.style.display = 'block';
            messageDiv.className = 'alert alert-error';
            const errors = Object.values(data).flat().join('<br>');
            messageDiv.innerHTML = `<i class="fas fa-exclamation-circle"></i> ${errors}`;
        }
    });
});
</script>
{% endblock %}
