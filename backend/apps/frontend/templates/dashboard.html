{% extends 'base.html' %}
{% load static %}

{% block title %}Dashboard - Task API{% endblock %}

{% block content %}
<div class="main-container">
    <div class="page-header">
        <h1><i class="fas fa-chart-pie"></i> Dashboard</h1>
        <p>Vue d'ensemble de votre activité</p>
    </div>
    
    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-number" id="total-tasks">0</div>
            <div class="stat-label">Tâches totales</div>
        </div>
        <div class="stat-card">
            <div class="stat-number" id="completed-tasks">0</div>
            <div class="stat-label">Tâches terminées</div>
        </div>
        <div class="stat-card">
            <div class="stat-number" id="pending-tasks">0</div>
            <div class="stat-label">Tâches en cours</div>
        </div>
        <div class="stat-card">
            <div class="stat-number" id="completion-rate">0%</div>
            <div class="stat-label">Taux de complétion</div>
        </div>
    </div>
    
    <div class="card">
        <div class="card-header">
            <h2><i class="fas fa-user-circle"></i> Informations personnelles</h2>
        </div>
        <div id="user-info">
            <p><i class="fas fa-spinner fa-spin"></i> Chargement...</p>
        </div>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const token = localStorage.getItem('access_token');
    
    if (!token) {
        window.location.href = '{% url "frontend:login" %}';
        return;
    }
    
    // Récupérer les infos utilisateur
    fetch('/api/accounts/me/', {
        headers: { 'Authorization': `Bearer ${token}` }
    })
    .then(response => response.json())
    .then(user => {
        document.getElementById('user-info').innerHTML = `
            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 1rem;">
                <div><strong><i class="fas fa-user"></i> Nom d'utilisateur :</strong> ${escapeHtml(user.username)}</div>
                <div><strong><i class="fas fa-envelope"></i> Email :</strong> ${escapeHtml(user.email || 'Non renseigné')}</div>
                <div><strong><i class="fas fa-id-card"></i> ID :</strong> ${user.id}</div>
            </div>
        `;
    });
    
    // Récupérer les stats des tâches
    fetch('/api/tasks/', {
        headers: { 'Authorization': `Bearer ${token}` }
    })
    .then(response => response.json())
    .then(data => {
        const tasks = data.results || data;
        const total = tasks.length;
        const completed = tasks.filter(t => t.completed).length;
        const pending = total - completed;
        const rate = total > 0 ? Math.round((completed / total) * 100) : 0;
        
        document.getElementById('total-tasks').textContent = total;
        document.getElementById('completed-tasks').textContent = completed;
        document.getElementById('pending-tasks').textContent = pending;
        document.getElementById('completion-rate').textContent = rate + '%';
    });
});

function escapeHtml(text) {
    if (!text) return '';
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}
</script>
{% endblock %}
