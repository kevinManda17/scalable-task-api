{% extends 'base.html' %}
{% load static %}

{% block title %}Connexion - Task API{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <h1><i class="fas fa-sign-in-alt"></i> Connexion</h1>
        
        <div id="login-message" class="alert" style="display: none;"></div>
        
        <form id="login-form">
            {% csrf_token %}
            
            <div class="form-group">
                <label for="username"><i class="fas fa-user"></i> Nom d'utilisateur</label>
                <input type="text" name="username" id="username" class="form-control" 
                       placeholder="Entrez votre nom d'utilisateur" required>
            </div>
            
            <div class="form-group">
                <label for="password"><i class="fas fa-lock"></i> Mot de passe</label>
                <input type="password" name="password" id="password" class="form-control" 
                       placeholder="Entrez votre mot de passe" required>
            </div>
            
            <button type="submit" class="btn btn-primary btn-block">
                <i class="fas fa-sign-in-alt"></i> Se connecter
            </button>
        </form>
        
        <div class="text-center mt-4">
            <p>Pas encore de compte ? <a href="{% url 'frontend:register' %}">Inscrivez-vous</a></p>
        </div>
    </div>
</div>

<script>
document.getElementById('login-form').addEventListener('submit', function(e) {
    e.preventDefault();
    
    const formData = {
        username: document.getElementById('username').value,
        password: document.getElementById('password').value
    };
    
    const messageDiv = document.getElementById('login-message');
    
    fetch('/api/accounts/login/', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
            'X-CSRFToken': getCookie('csrftoken')
        },
        body: JSON.stringify(formData)
    })
    .then(response => response.json())
    .then(data => {
        if (data.access) {
            // Stocker les tokens
            localStorage.setItem('access_token', data.access);
            localStorage.setItem('refresh_token', data.refresh);
            
            messageDiv.style.display = 'block';
            messageDiv.className = 'alert alert-success';
            messageDiv.innerHTML = '<i class="fas fa-check-circle"></i> Connexion réussie ! Redirection...';
            
            setTimeout(() => {
                window.location.href = '{% url "frontend:dashboard" %}';
            }, 1000);
        } else {
            messageDiv.style.display = 'block';
            messageDiv.className = 'alert alert-error';
            messageDiv.innerHTML = '<i class="fas fa-exclamation-circle"></i> Identifiants invalides';
        }
    })
    .catch(error => {
        messageDiv.style.display = 'block';
        messageDiv.className = 'alert alert-error';
        messageDiv.innerHTML = '<i class="fas fa-exclamation-circle"></i> Une erreur est survenue';
    });
});
</script>
{% endblock %}
