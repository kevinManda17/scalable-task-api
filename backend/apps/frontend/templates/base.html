<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Task API - Gestion de Tâches{% endblock %}</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Font Awesome pour les icônes -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Style principal -->
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
    {% block extra_css %}{% endblock %}
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="{% url 'frontend:home' %}" class="nav-brand">
                <i class="fas fa-tasks"></i> TaskAPI
            </a>
            
            <div class="nav-menu">
                <a href="{% url 'frontend:home' %}" class="nav-link {% if request.resolver_match.url_name == 'home' %}active{% endif %}">
                    <i class="fas fa-home"></i> Accueil
                </a>
                <a href="{% url 'frontend:dashboard' %}" class="nav-link {% if request.resolver_match.url_name == 'dashboard' %}active{% endif %}">
                    <i class="fas fa-chart-pie"></i> Dashboard
                </a>
                <a href="{% url 'frontend:tasks' %}" class="nav-link {% if request.resolver_match.url_name == 'tasks' %}active{% endif %}">
                    <i class="fas fa-list-check"></i> Tâches
                </a>
                
                <span id="auth-section">
                    <a href="{% url 'frontend:login' %}" class="nav-link">
                        <i class="fas fa-sign-in-alt"></i> Connexion
                    </a>
                    <a href="{% url 'frontend:register' %}" class="nav-link">
                        <i class="fas fa-user-plus"></i> Inscription
                    </a>
                </span>
            </div>
        </div>
    </nav>

    <main>
        {% block content %}{% endblock %}
    </main>

    <!-- JavaScript global -->
    <script>
        // Configuration CSRF pour les requêtes AJAX
        function getCookie(name) {
            let cookieValue = null;
            if (document.cookie && document.cookie !== '') {
                const cookies = document.cookie.split(';');
                for (let i = 0; i < cookies.length; i++) {
                    const cookie = cookies[i].trim();
                    if (cookie.substring(0, name.length + 1) === (name + '=')) {
                        cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                        break;
                    }
                }
            }
            return cookieValue;
        }
        
        const csrftoken = getCookie('csrftoken');
        
        // Vérifier l'état de connexion au chargement
        document.addEventListener('DOMContentLoaded', function() {
            const token = localStorage.getItem('access_token');
            const authSection = document.getElementById('auth-section');
            
            if (token) {
                // Vérifier si le token est valide
                fetch('/api/auth/token/verify/', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ token: token })
                })
                .then(response => {
                    if (response.ok) {
                        // Token valide - récupérer les infos utilisateur
                        fetch('/api/accounts/me/', {
                            headers: {
                                'Authorization': `Bearer ${token}`
                            }
                        })
                        .then(res => res.json())
                        .then(user => {
                            authSection.innerHTML = `
                                <span id="user-greeting">
                                    <i class="fas fa-user-circle"></i> ${user.username}
                                </span>
                                <button class="btn-logout" onclick="logout()">
                                    <i class="fas fa-sign-out-alt"></i> Déconnexion
                                </button>
                            `;
                        });
                    } else {
                        // Token invalide
                        localStorage.removeItem('access_token');
                        localStorage.removeItem('refresh_token');
                    }
                });
            }
        });
        
        function logout() {
            const refreshToken = localStorage.getItem('refresh_token');
            
            fetch('/api/accounts/logout/', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${localStorage.getItem('access_token')}`,
                    'X-CSRFToken': csrftoken
                },
                body: JSON.stringify({ refresh: refreshToken })
            })
            .finally(() => {
                localStorage.removeItem('access_token');
                localStorage.removeItem('refresh_token');
                window.location.href = '{% url "frontend:login" %}';
            });
        }
    </script>
    
    {% block extra_js %}{% endblock %}
</body>
</html>
