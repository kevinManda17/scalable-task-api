<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Scalable Task API</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 20px; background: #f5f5f5; }
        nav { margin-bottom: 20px; }
        nav a { margin-right: 15px; text-decoration: none; color: #0d6efd; }
        form { display: grid; gap: 10px; max-width: 360px; }
        input { padding: 10px; font-size: 1rem; width: 100%; }
        button { padding: 10px 15px; font-size: 1rem; cursor: pointer; }
        .card { background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,.1); }
        ul { list-style: none; padding: 0; }
        li { padding: 10px 0; border-bottom: 1px solid #eee; }
    </style>
</head>
<body>
    <nav>
        <a href="/dashboard/">Dashboard</a>
        <a href="/tasks/">Tasks</a>
        <a href="/login/">Login</a>
        <a href="/register/">Register</a>
    </nav>

    {% block content %}{% endblock %}
</body>
</html>
