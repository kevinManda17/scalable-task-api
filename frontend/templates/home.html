{% extends "base.html" %}

{% block content %}
<div class="card">
    <h1>Scalable Task API</h1>
    <p>Bienvenue sur votre gestionnaire de tâches !</p>

    <div id="stats">
        <h2>Statistiques</h2>
        <p>Total des tâches : <span id="total-tasks">0</span></p>
        <p>Tâches terminées : <span id="completed-tasks">0</span></p>
        <p>Tâches en cours : <span id="pending-tasks">0</span></p>
    </div>

    <div id="recent-tasks">
        <h2>Dernières tâches</h2>
        <ul id="recent-list"></ul>
    </div>

    <div id="quick-actions">
        <h2>Actions rapides</h2>
        <a href="/tasks/" class="btn">Voir toutes les tâches</a>
        <a href="/register/" class="btn" id="register-link">S'inscrire</a>
        <a href="/login/" class="btn" id="login-link">Se connecter</a>
        <button id="logout-btn" class="btn" style="display: none;">Déconnexion</button>
    </div>
</div>

<script>
const getCookie = name => document.cookie.split('; ').find(row => row.startsWith(name + '='))?.split('=')[1];
const csrftoken = getCookie('csrftoken');

const totalTasksEl = document.getElementById('total-tasks');
const completedTasksEl = document.getElementById('completed-tasks');
const pendingTasksEl = document.getElementById('pending-tasks');
const recentListEl = document.getElementById('recent-list');
const registerLink = document.getElementById('register-link');
const loginLink = document.getElementById('login-link');
const logoutBtn = document.getElementById('logout-btn');

const loadDashboard = async () => {
    try {
        const response = await fetch('/api/tasks/', { credentials: 'include' });
        if (response.ok) {
            const tasks = await response.json();
            const total = tasks.length;
            const completed = tasks.filter(t => t.completed).length;
            const pending = total - completed;

            totalTasksEl.textContent = total;
            completedTasksEl.textContent = completed;
            pendingTasksEl.textContent = pending;

            // Afficher les 5 dernières tâches
            const recentTasks = tasks.slice(-5).reverse();
            recentListEl.innerHTML = '';
            recentTasks.forEach(task => {
                const li = document.createElement('li');
                li.innerHTML = `<strong>${task.title}</strong> - ${task.completed ? 'Terminée' : 'En cours'}`;
                recentListEl.appendChild(li);
            });

            // Masquer les liens de connexion si connecté
            registerLink.style.display = 'none';
            loginLink.style.display = 'none';
            logoutBtn.style.display = 'inline-block';
        } else {
            // Si pas connecté, afficher les liens de connexion
            registerLink.style.display = 'inline-block';
            loginLink.style.display = 'inline-block';
            logoutBtn.style.display = 'none';
        }
    } catch (error) {
        console.error('Erreur lors du chargement du dashboard:', error);
    }
};

logoutBtn.addEventListener('click', async () => {
    await fetch('/api/accounts/logout/', {
        method: 'POST',
        credentials: 'include',
        headers: { 'X-CSRFToken': csrftoken },
    });
    location.reload();
});

loadDashboard();
</script>

<style>
.btn {
    display: inline-block;
    padding: 10px 15px;
    margin: 5px;
    background: #0d6efd;
    color: white;
    text-decoration: none;
    border-radius: 4px;
    border: none;
    cursor: pointer;
}

.btn:hover {
    background: #0b5ed7;
}

#stats {
    margin: 20px 0;
}

#recent-tasks {
    margin: 20px 0;
}

#quick-actions {
    margin: 20px 0;
}
</style>

{% endblock %}
